name: Desktop Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
      - "desktop-v*"

permissions:
  contents: write

jobs:
  publish-release:
    if: ${{ startsWith(github.ref_name, 'desktop-v') || !contains(github.ref_name, '-') }}
    runs-on: windows-latest
    env:
      AI_NOVEL_RELEASE_CHANNEL: release
      AI_NOVEL_ALLOW_UNSIGNED_RELEASE: "true"
      AI_NOVEL_GITHUB_OWNER: ExplosiveCoderflome
      AI_NOVEL_GITHUB_REPO: AI-Novel-Writing-Assistant
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.6.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install desktop icon tooling
        run: python -m pip install --disable-pip-version-check pillow

      - name: Regenerate desktop icon assets
        run: python desktop/scripts/generate-desktop-icons.py

      - name: Typecheck
        run: pnpm typecheck

      - name: Build and stage desktop app
        run: pnpm stage:desktop

      - name: Verify packaged desktop layout
        run: pnpm verify:desktop-package:reuse-stage

      - name: Publish desktop release to GitHub Releases
        run: pnpm publish:desktop:release:reuse-stage

      - name: Update GitHub release notes
        run: node scripts/update-desktop-release-notes.cjs
